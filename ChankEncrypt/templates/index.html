<!DOCTYPE html>
<html>

<head>
    <title>Тест шифрования</title>
</head>

<body>
    <h1>Тест RSA шифрования</h1>
    <input type="file" id="fileInput">
    <button id="run">Запустить файл</button>
    <script src="static\appCrypto.js"></script>
    <script>

        document.addEventListener("DOMContentLoaded", async function () {
        
            let keys = JSON.parse(localStorage.getItem("key"));
            if (keys === null) {
                keys = await generateEncryptionKeyPair();
                localStorage.setItem("key", JSON.stringify(keys));
            }
            let file = null;
            const chunkSize = 512 * 1024;
            const fileInput = document.getElementById("fileInput");
        
            fileInput.addEventListener("change", () => {
                file = fileInput.files[0];
                //console.log("Файл получен:", file);
                processFile(file,keys.publicKey)
            });
        
            document.getElementById("run").addEventListener("click", async function () {
                if (!file) {
                    alert("Выбери файл");
                    return;
                }
                await processFile(file, keys.publicKey);
        
            });
        
        });

        async function processFile(file, publicKeyB64) {
            const fileKey = await crypto.subtle.generateKey(
                {
                    name: "AES-GCM",
                    length: 256
                },
                true,
                ["encrypt", "decrypt"]
            );

            const metadata = {
                name: file.name,
                type: file.type,
                size: file.size,
                chunk_size: chunkSize,
                chunk_count: Math.ceil(file.size / chunkSize)
            };

            console.log("metadata:", metadata);

            // 3 encrypt metadata
            const metadataEncrypted = await encryptMetadata(
                fileKey,
                metadata
            );

            console.log("metadata encrypted");

            // 4 encrypt AES key
            const encryptedFileKey = await encryptFileKey(
                fileKey,
                publicKeyB64
            );

            console.log("AES key encrypted");

            // 5 разбиваем файл

            for (let i = 0; i < metadata.chunk_count; i++) {
                const start = i * chunkSize;
                const end = start + chunkSize;
                const blobChunk = file.slice(start, end);
                const buffer = await blobChunk.arrayBuffer();
                const encryptedChunk = await encryptChunk(
                    fileKey,
                    buffer
                );
                console.log(
                    "chunk",
                    i,
                    encryptedChunk
                );
                // тут будет отправка на сервер
        }

}

async function encryptMetadata(fileKey, metadata) {

    const iv = crypto.getRandomValues(
        new Uint8Array(12)
    );

    const encoded = new TextEncoder().encode(
        JSON.stringify(metadata)
    );

    const cipher = await crypto.subtle.encrypt(
        {
            name: "AES-GCM",
            iv: iv
        },
        fileKey,
        encoded
    );

    return {
        cipher,
        iv
    };
}

async function encryptChunk(fileKey, buffer) {

    const iv = crypto.getRandomValues(
        new Uint8Array(12)
    );

    const cipher = await crypto.subtle.encrypt(
        {
            name: "AES-GCM",
            iv: iv
        },
        fileKey,
        buffer
    );

    return {
        cipher,
        iv
    };
}

async function encryptFileKey(fileKey, publicKeyB64) {

    const rawKey = await crypto.subtle.exportKey(
        "raw",
        fileKey
    );

    const publicKey = await importPublicKey(
        publicKeyB64
    );

    const encrypted = await crypto.subtle.encrypt(
        {
            name: "RSA-OAEP"
        },
        publicKey,
        rawKey
    );

    return encrypted;
}

    </script>
</body>

</html>
