<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создание группы</title>

</head>
<body>

<button id="createGroupBtn">Создать группу</button>

<div class="modal" id="groupModal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2>Новая группа</h2>

        <div class="avatar-upload">
            <img src="" id="avatarPreview" class="avatar-preview" alt="+">
            <input type="file" id="avatarInput" accept="image/*" hidden>
        </div>

        <input type="text" id="groupName" placeholder="Название группы">

        <div class="search-container">
            <input type="text" id="userSearch" placeholder="Поиск пользователя по ID">
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="selected-users" id="selectedUsers"></div>

        <button id="createBtn">Создать</button>
    </div>
</div>

<script>
const modal = document.getElementById("groupModal");
const openBtn = document.getElementById("createGroupBtn");
const closeBtn = document.getElementById("closeModal");
const avatarPreview = document.getElementById("avatarPreview");
const avatarInput = document.getElementById("avatarInput");
const userSearch = document.getElementById("userSearch");
const suggestions = document.getElementById("suggestions");
const selectedUsers = document.getElementById("selectedUsers");

const selected = new Map();

openBtn.onclick = () => modal.style.display = "flex";
closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
};

avatarPreview.onclick = () => avatarInput.click();

avatarInput.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        avatarPreview.src = URL.createObjectURL(file);
    }
};

let searchTimeout;

userSearch.addEventListener("input", () => {
    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(() => {
        search();
    }, 800); // 400мс после остановки ввода
});

async function search() {
    const query = userSearch.value.trim();
    suggestions.innerHTML = "";

    if (!query) return;

    try {
        // Замени на свой API:
        // const res = await fetch(`/search_users?id=${encodeURIComponent(query)}`);
        // const users = await res.json();

        // Временная заглушка:
        const users = [
            {id: "123", name: "Alex"},
            {id: "124", name: "Alice"},
            {id: "125", name: "Aleksey"}
        ].filter(u => u.id.includes(query));

        users.forEach(user => {
            if (selected.has(user.id)) return;

            const div = document.createElement("div");
            div.className = "suggestion-item";
            div.textContent = `${user.name} (${user.id})`;

            div.onclick = () => addUser(user);
            suggestions.appendChild(div);
        });

    } catch (err) {
        console.error("Ошибка поиска:", err);
    }
}

function addUser(user) {
    selected.set(user.id, user);
    renderSelectedUsers();
    userSearch.value = "";
    suggestions.innerHTML = "";
}

function removeUser(id) {
    selected.delete(id);
    renderSelectedUsers();
}



function renderSelectedUsers() {
    selectedUsers.innerHTML = "";

    selected.forEach(user => {
        const chip = document.createElement("div");
        chip.className = "user-chip";
        chip.innerHTML = `
            <span>${user.name} (${user.id})</span>
            <button data-id="${user.id}">&times;</button>
        `;

        chip.querySelector("button").onclick = () => removeUser(user.id);
        selectedUsers.appendChild(chip);
    });
}

document.getElementById("createBtn").onclick = () => {
    const groupName = document.getElementById("groupName").value.trim();

    const payload = {
        name: groupName,
        users: [...selected.keys()],
        avatar: avatarInput.files[0] || null
    };

    console.log("Группа к созданию:", payload);

    // Тут отправка на сервер
    // fetch('/create_group', { method: 'POST', body: ... })
};
</script>

</body>
</html>
